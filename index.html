<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #ad-container { text-align: center; padding: 20px; }
        #player { display: none; width: 100%; max-height: 100vh; background: #000; }
        .btn { background: #248bcf; border: none; color: white; padding: 16px 32px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="ad-container">
        <h2>Content Locked</h2>
        <p>Watch a short ad to play this 30s segment</p>
        <button class="btn" onclick="playAd()">🔓 Unlock & Play</button>
    </div>

    <video id="player" controls playsinline></video>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Updated with your Block ID (Double check if Adsgram gave you a new Block ID for Platform 28013)
        const AdController = window.Adsgram.init({ blockId: "28013" });

        function playAd() {
            AdController.show().then((result) => {
                unlockAndPlay();
            }).catch((result) => {
                alert("Ad error or skipped. Please watch to the end to unlock.");
                console.error("Adsgram error:", result);
            });
        }

        function unlockAndPlay() {
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('vid');
            const part = params.get('part');
            
            // Updated to your new GitHub URL
            const videoUrl = `https://kenyatamu254-coder.github.io/video-player-app/segments/${videoId}_part_${part}.mp4`;

            document.getElementById('ad-container').style.display = 'none';
            const player = document.getElementById('player');
            player.style.display = 'block';
            player.src = videoUrl;
            player.play();
        }
    </script>
</body>
</html>
