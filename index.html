<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- ✅ UPDATED Adsgram Script -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #video-container {
            width: 100%; max-width: 600px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 10px; overflow: hidden;
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }
        video { width: 100%; height: 100%; object-fit: contain; display: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; text-align: center;
        }
        .btn {
            background: #f39c12; color: #fff; border: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
        .btn:disabled { background: #555; }
    </style>
</head>
<body>

    <h2>📺 Exclusive Content</h2>

    <div id="video-container">
        <div id="overlay">
            <h3 id="status-title">Video Locked</h3>
            <p id="status-desc" style="color: #ccc; margin-bottom: 20px; font-size: 14px;">Watch a quick ad to unlock</p>
            
            <!-- ✅ UPDATED Button to match your request -->
            <button id="unlockBtn" class="btn" onclick="showAdToUser()">Watch Ad to Play Video</button>
        </div>

        <video id="video-player" controls controlsList="nodownload">
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // --- PARAMETER PARSING ---
        let videoId = null;
        let partNum = null;
        const urlParams = new URLSearchParams(window.location.search);
        const startParam = window.Telegram?.WebApp?.initDataUnsafe?.start_param || urlParams.get('startapp');

        if (startParam) {
            const match = startParam.match(/vid_(.*)_part_(\d+)/);
            if (match) {
                videoId = match[1].toLowerCase();
                partNum = match[2];
            }
        }

        // ✅ 1. Initialize the ad controller with your Block ID
        const AdController = window.Adsgram.init({ blockId: "28881" }); 

        if (videoId && partNum) {
            const paddedPart = partNum.padStart(3, '0');
            const videoUrl = `segments/${videoId}_part_${paddedPart}.mp4`;
            
            const player = document.getElementById('video-player');
            const source = document.getElementById('video-source');
            
            source.src = videoUrl;
            player.load();

            player.onerror = function() {
                document.getElementById('status-title').innerText = "❌ Video Not Found";
                document.getElementById('status-desc').innerHTML = `Looking for: <br><code style="color:yellow">${videoUrl}</code><br>Check your GitHub folder!`;
                document.getElementById('unlockBtn').style.display = 'none';
            };
        } else {
            document.getElementById('status-title').innerText = "❌ Invalid Link";
        }

        // --- ROBUST UNLOCK & PLAY FUNCTION ---
        function unlockAndPlay() {
            const player = document.getElementById('video-player');
            const overlay = document.getElementById('overlay');
            
            overlay.style.display = 'none';
            player.style.display = 'block';
            
            try {
                player.load();
                const playPromise = player.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log("✅ Video started successfully.");
                    }).catch(error => {
                        console.log("⚠️ Play interrupted. Attempting a safe retry...", error);
                        setTimeout(() => {
                            player.load();
                            const retryPromise = player.play();
                            if (retryPromise !== undefined) {
                                retryPromise.catch(e => {
                                    console.log("❌ Auto-play blocked. User must click play.", e);
                                    player.controls = true; 
                                });
                            }
                        }, 500); 
                    });
                }
            } catch (err) {
                console.error("Critical player error:", err);
                player.controls = true;
            }
        }

        // ✅ 2. NEW Function to show the ad based on your snippet
        function showAdToUser() {
            const btn = document.getElementById('unlockBtn');
            btn.innerText = "⌛ Loading Ad...";
            btn.disabled = true;

            AdController.show().then((result) => {
                // This runs if the user watched the full ad
                console.log("Ad finished! Rewarding user...");
                unlockAndPlay(); // Starts the video
            }).catch((result) => {
                // This runs if the ad failed or was closed early
                console.error("Ad error or closed:", result.description);
                btn.innerText = "Watch Ad to Play Video";
                btn.disabled = false;
                alert("Please watch the full ad to continue.");
            });
        }
    </script>
</body>
</html>
