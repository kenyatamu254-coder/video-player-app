<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script id="adsgram-sdk" src="https://adsgram.ai/sdk.js"></script> 
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        #ad-container { text-align: center; padding: 20px; }
        #player { display: none; width: 100%; height: auto; background: #000; }
        .btn { 
            background: #248bcf; 
            border: none; 
            color: white; 
            padding: 16px 32px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        .btn:disabled { background: #555; cursor: not-allowed; }
        h2 { margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="ad-container">
        <h2>Content Locked</h2>
        <p>Watch a short ad to play this 30s segment</p>
        <button class="btn" id="unlockBtn" onclick="playAd()">🔓 Unlock & Play</button>
    </div>

    <video id="player" controls playsinline></video>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let AdController = null;

        // --- 1. INITIALIZATION CHECK ---
        // We wait for the page to finish loading before checking for Adsgram
        window.onload = () => {
            if (window.Adsgram) {
                // Success: Initialize the controller with test ID
                AdController = window.Adsgram.init({ blockId: "28881" });
                console.log("Adsgram SDK Loaded Successfully");
            } else {
                // Failure: The script was likely blocked by the phone/network
                console.error("Adsgram SDK blocked.");
                alert("Connection Error: Please disable your ad-blocker or Private DNS to watch videos.");
            }
        };

        // --- 2. AD PLAYBACK LOGIC ---
        async function playAd() {
            if (!AdController) {
                alert("Ad system is still loading or blocked. Please refresh or check your internet.");
                return;
            }

            const btn = document.getElementById('unlockBtn');
            btn.innerText = "⌛ Loading Ad...";
            btn.disabled = true;

            try {
                console.log("Attempting to show ad...");
                const result = await AdController.show();
                
                if (result.done) {
                    // Success! User watched the whole ad.
                    unlockAndPlay();
                } else {
                    // User closed the ad early
                    alert("You must watch the full ad to unlock the video.");
                    btn.innerText = "🔓 Unlock & Play";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Adsgram Error:", error);
                
                // Detailed Debugging for you
                if (error.error === "no_fill") {
                    console.log("No fill available. Unlocking for testing.");
                } else {
                    console.log("Adsgram Error: " + JSON.stringify(error));
                }

                // Fallback: Unlock anyway for testing purposes
                unlockAndPlay(); 
            }
        }

        // --- 3. VIDEO UNLOCK LOGIC ---
        function unlockAndPlay() {
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('vid');
            let part = params.get('part');

            if (!videoId || part === null) {
                alert("Error: Missing video data in the link.");
                return;
            }

            // Fix: Converts part '0' to '000' to match your GitHub segments folder
            const paddedPart = part.toString().padStart(3, '0');
            
            const videoUrl = `https://kenyatamu254-coder.github.io/video-player-app/segments/${videoId}_part_${paddedPart}.mp4`;

            console.log("Loading Video Segment:", videoUrl);

            // UI Cleanup
            document.getElementById('ad-container').style.display = 'none';
            const player = document.getElementById('player');
            player.style.display = 'block';
            
            // Set Source and Play
            player.src = videoUrl;
            player.load(); 
            
            player.play().catch(e => {
                console.warn("Autoplay blocked:", e);
                alert("Tap the play button on the video player to start.");
            });
        }
    </script>
</body>
</html>
