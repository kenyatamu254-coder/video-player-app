<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #video-container {
            width: 100%; max-width: 600px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 10px; overflow: hidden;
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }
        video { width: 100%; height: 100%; object-fit: contain; display: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; text-align: center;
        }
        .btn {
            background: #f39c12; color: #fff; border: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
        .btn:disabled { background: #555; }
    </style>
</head>
<body>

    <h2>📺 Exclusive Content</h2>

    <div id="video-container">
        <div id="overlay">
            <h3 id="status-title">Video Locked</h3>
            <p id="status-desc" style="color: #ccc; margin-bottom: 20px; font-size: 14px;">Watch a quick ad to unlock</p>
            <button id="unlockBtn" class="btn" onclick="playAd()">🔓 Unlock & Play</button>
        </div>

        <video id="video-player" controls controlsList="nodownload">
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // --- PARAMETER PARSING ---
        let videoId = null;
        let partNum = null;
        const urlParams = new URLSearchParams(window.location.search);
        const startParam = window.Telegram?.WebApp?.initDataUnsafe?.start_param || urlParams.get('startapp');

        if (startParam) {
            // Regex to catch vid_xxxx_part_x
            const match = startParam.match(/vid_(.*)_part_(\d+)/);
            if (match) {
                videoId = match[1].toLowerCase(); // Force lowercase
                partNum = match[2];
            }
        }

        const AdController = window.Adsgram.init({ blockId: "28881" }); 

        if (videoId && partNum) {
            const paddedPart = partNum.padStart(3, '0');
            const videoUrl = `segments/${videoId}_part_${paddedPart}.mp4`;
            
            const player = document.getElementById('video-player');
            const source = document.getElementById('video-source');
            
            source.src = videoUrl;
            player.load();

            // DEBUGGER: If the video fails to load, tell us why
            player.onerror = function() {
                document.getElementById('status-title').innerText = "❌ Video Not Found";
                document.getElementById('status-desc').innerHTML = `Looking for: <br><code style="color:yellow">${videoUrl}</code><br>Check your GitHub folder!`;
                document.getElementById('unlockBtn').style.display = 'none';
            };
        } else {
            document.getElementById('status-title').innerText = "❌ Invalid Link";
        }

        function unlockAndPlay() {
            document.getElementById('overlay').style.display = 'none';
            const player = document.getElementById('video-player');
            player.style.display = 'block';
            player.play().catch(e => console.log("Manual play required"));
        }

        async function playAd() {
            const btn = document.getElementById('unlockBtn');
            btn.innerText = "⌛ Loading Ad...";
            btn.disabled = true;

            try {
                const result = await AdController.show();
                if (result.done) {
                    unlockAndPlay();
                } else {
                    btn.innerText = "🔓 Unlock & Play";
                    btn.disabled = false;
                    alert("Please watch the full ad to continue.");
                }
            } catch (error) {
                // BYPASS for Ad-Blockers/No Fill
                btn.innerText = "⚡ Connection slow... Unlocking anyway";
                setTimeout(unlockAndPlay, 2000);
            }
        }
    </script>
</body>
</html>
