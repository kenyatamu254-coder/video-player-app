<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <!-- Adsgram SDK -->
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #video-container {
            width: 100%;
            max-width: 600px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            display: none; /* Hidden until ad is watched */
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .btn {
            background: #f39c12;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .btn:hover:not(:disabled) {
            background: #e67e22;
        }
        .info-text {
            color: #aaa;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>📺 Exclusive Content</h2>

    <div id="video-container">
        <!-- The overlay that locks the video -->
        <div id="overlay">
            <h3 style="margin-bottom: 5px;">Video Locked</h3>
            <p style="color: #ccc; margin-bottom: 20px; font-size: 14px;">Watch a quick ad to support sqwid onthebeat!</p>
            <button id="unlockBtn" class="btn" onclick="playAd()">🔓 Unlock & Play</button>
        </div>

        <!-- The actual video player -->
        <video id="video-player" controls controlsList="nodownload">
            <source id="video-source" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <p class="info-text">Powered by @Kenya_Tamu_Bot</p>

    <script>
        // 1. Get the parameters from the URL (e.g., ?vid=vid123&part=1)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('vid');
        let partNum = urlParams.get('part');

        // 2. Initialize the Adsgram SDK
        // NOTE: Still using the test block "dd66". Change to your real one when ready to launch!
        const AdController = window.Adsgram.init({ blockId: "28881" }); 

        // 3. Load the correct video segment
        if (videoId && partNum) {
            // Pad the part number with zeros to match ffmpeg output (e.g., 1 -> 001)
            const paddedPart = partNum.padStart(3, '0');
            const videoUrl = `segments/${videoId}_part_${paddedPart}.mp4`;
            
            document.getElementById('video-source').src = videoUrl;
            document.getElementById('video-player').load();
        } else {
            document.getElementById('overlay').innerHTML = "<h3>❌ Invalid Video Link</h3>";
        }

        // 4. The function that unlocks and plays the video
        function unlockAndPlay() {
            document.getElementById('overlay').style.display = 'none';
            const player = document.getElementById('video-player');
            player.style.display = 'block';
            player.play();
        }

        // 5. The "Professional" Ad Logic
        async function playAd() {
            const btn = document.getElementById('unlockBtn');
            btn.innerText = "⌛ Checking for Ads...";
            btn.disabled = true;

            try {
                if (!AdController) {
                    throw new Error("SDK_NOT_LOADED");
                }

                // Try to show the ad
                const result = await AdController.show();
                
                if (result.done) {
                    // SUCCESS: User watched it. You get paid!
                    unlockAndPlay();
                } else {
                    // USER CLOSED IT EARLY
                    btn.innerText = "❌ Please watch the full ad";
                    setTimeout(() => { 
                        btn.innerText = "🔓 Unlock & Play"; 
                        btn.disabled = false;
                    }, 3000);
                }
            } catch (error) {
                console.log("Ad Blocked or No Fill:", error);
                
                // --- THE PRO BYPASS ---
                // If they have an adblocker (Private DNS), don't yell at them.
                // Just pretend the network is slow and let them watch anyway.
                btn.innerText = "⚡ Connection slow... Unlocking anyway";
                
                setTimeout(() => {
                    unlockAndPlay(); 
                }, 2000);
            }
        }
    </script>
</body>
</html>
